name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: table_order
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Setup Database
      run: |
        mysql -h 127.0.0.1 -u root -ppassword table_order < src/main/webapp/sql/schema.sql
        mysql -h 127.0.0.1 -u root -ppassword table_order < src/main/webapp/sql/seed.sql

    - name: Prepare database.properties
      run: |
        cp src/main/resources/database.properties.template src/main/resources/database.properties
        # テンプレート内のプレースホルダを正確に置換
        sed -i 's|db.mysql.url=jdbc:mysql://localhost:3306/table_order_db?useSSL=false&serverTimezone=UTC|db.mysql.url=jdbc:mysql://127.0.0.1:3306/table_order?useSSL=false\&serverTimezone=UTC|' src/main/resources/database.properties
        sed -i 's/db.mysql.pass=YOUR_MYSQL_PASSWORD_HERE/db.mysql.pass=password/' src/main/resources/database.properties
        sed -i 's/app.security.pepper=YOUR_SECRET_PEPPER_HERE/app.security.pepper=test_pepper/' src/main/resources/database.properties

    - name: Build and Test with Maven
      run: mvn clean test
