name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DB_IS_ORACLE: "false"
      DB_MYSQL_DRIVER: com.mysql.cj.jdbc.Driver
      DB_MYSQL_URL: jdbc:mysql://127.0.0.1:3306/table_order?useSSL=false&serverTimezone=UTC
      DB_MYSQL_USER: root
      DB_MYSQL_PASS: password
      APP_SECURITY_PEPPER: test_pepper
      CLOUDINARY_CLOUD_NAME: test_cloud
      CLOUDINARY_API_KEY: test_key
      CLOUDINARY_API_SECRET: test_secret

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: table_order
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build, Test, and Run Quality Checks
      run: mvn clean verify
